name: Release BetterTips

on:
  push:
    tags:
      - 'release/[0-9]+.[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '4-part version (e.g. 0.1.0.0).'
        required: true
        type: string
      dry_run:
        description: 'Skip cross-repo writes (build + upload artifacts only).'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Resolve version and mode
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            Write-Host "workflow_dispatch (dry_run=$env:DRY_RUN) version=$version"
          } else {
            $version = "${{ github.ref_name }}" -replace '^release/', ''
            Write-Host "tag push version=$version"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            Write-Error "Version '$version' is not 4-part dotted decimal"
            exit 1
          }
          "BETTERTIPS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # KamiToolKit is a git submodule referenced as a project; without it the build can't resolve it.
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud distribution
        shell: pwsh
        run: |
          # The csproj resolves DalamudLibPath from $DALAMUD_HOME when set; otherwise it
          # expects ../dalamud/ relative to the project, which doesn't exist on a CI runner.
          # KamiToolKit can ONLY resolve Dalamud refs through $DALAMUD_HOME (see CLAUDE.md), so this
          # env var is doubly required here.
          $dalamudDir = Join-Path $env:RUNNER_TEMP "dalamud"
          $zip = Join-Path $env:RUNNER_TEMP "dalamud-dist.zip"
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dalamudDir -Force
          Remove-Item $zip
          if (-not (Test-Path (Join-Path $dalamudDir "Dalamud.dll"))) {
            Write-Error "Dalamud.dll not found after extracting distrib. Layout may have changed."
            exit 1
          }
          "DALAMUD_HOME=$dalamudDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Dalamud refs staged at $dalamudDir"

      - name: Build Release with version override
        shell: pwsh
        run: |
          dotnet build BetterTips.csproj -c Release `
            -p:Version=$env:BETTERTIPS_VERSION `
            -p:AssemblyVersion=$env:BETTERTIPS_VERSION `
            -p:FileVersion=$env:BETTERTIPS_VERSION `
            -p:InformationalVersion=$env:BETTERTIPS_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stage release artifact
        shell: pwsh
        run: |
          # DalamudPackager (bundled with Dalamud.NET.Sdk) writes latest.zip under bin/Release.
          $latest = Get-ChildItem -Path "bin/Release" -Recurse -Filter "latest.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $latest) {
            Write-Error "DalamudPackager did not produce latest.zip under bin/Release. Check the Release build output."
            exit 1
          }
          $pluginZip = Join-Path $latest.DirectoryName "$env:BETTERTIPS_VERSION.zip"
          Copy-Item -Force $latest.FullName $pluginZip
          "PLUGIN_ZIP=$pluginZip" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Packaged $pluginZip"

          # DalamudPackager writes the API level into the manifest next to latest.zip. The index.json
          # entry needs it: a testing-exclusive plugin is filtered out by Dalamud's CanUseTesting()
          # unless TestingDalamudApiLevel is set, and the install compat check is DalamudApiLevel == running level.
          $manifest = Join-Path $latest.DirectoryName "BetterTips.json"
          if (-not (Test-Path $manifest)) {
            $manifest = Get-ChildItem -Path "bin/Release" -Recurse -Filter "BetterTips.json" -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object { $_.FullName }
          }
          $apiLevel = (Get-Content $manifest -Raw | ConvertFrom-Json).DalamudApiLevel
          if (-not $apiLevel) {
            Write-Error "Could not read DalamudApiLevel from packaged manifest ($manifest)."
            exit 1
          }
          "BETTERTIPS_API_LEVEL=$apiLevel" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Packaged manifest DalamudApiLevel=$apiLevel"

      - name: Upload artifact (dry-run only)
        if: env.DRY_RUN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bettertips-${{ env.BETTERTIPS_VERSION }}-dry-run
          path: ${{ env.PLUGIN_ZIP }}
          if-no-files-found: error

      - name: Bump csproj version on main
        if: env.DRY_RUN != 'true'
        shell: pwsh
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          $csproj = "BetterTips.csproj"
          $content = Get-Content $csproj -Raw
          $content = $content -replace '<AssemblyVersion>[^<]+</AssemblyVersion>',           "<AssemblyVersion>$env:BETTERTIPS_VERSION</AssemblyVersion>"
          $content = $content -replace '<FileVersion>[^<]+</FileVersion>',                   "<FileVersion>$env:BETTERTIPS_VERSION</FileVersion>"
          $content = $content -replace '<InformationalVersion>[^<]+</InformationalVersion>', "<InformationalVersion>$env:BETTERTIPS_VERSION</InformationalVersion>"
          Set-Content -Path $csproj -Value $content -NoNewline
          $changed = git status --porcelain $csproj
          if (-not $changed) {
            Write-Host "csproj already at $env:BETTERTIPS_VERSION; nothing to commit"
          } else {
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $csproj
            git commit -m "chore: bump version to $env:BETTERTIPS_VERSION [skip ci]"
            git push origin main
          }

      - name: Publish BetterTips release
        if: env.DRY_RUN != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:BETTERTIPS_VERSION `
            --repo Hildaware/BetterTips `
            --title $env:BETTERTIPS_VERSION `
            --notes "BetterTips $env:BETTERTIPS_VERSION" `
            $env:PLUGIN_ZIP
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "RELEASE_URL=https://github.com/Hildaware/BetterTips/releases/tag/$env:BETTERTIPS_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Update index.json on Hildaware/xiv
        if: env.DRY_RUN != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.HILDAWARE_PAT }}
        run: |
          $xivPath = Join-Path $env:RUNNER_TEMP "xiv"
          git clone "https://x-access-token:$env:GH_TOKEN@github.com/Hildaware/xiv.git" $xivPath
          Push-Location $xivPath

          $indexPath = "index.json"
          $download = "https://github.com/Hildaware/BetterTips/releases/download/$env:BETTERTIPS_VERSION/$env:BETTERTIPS_VERSION.zip"

          $raw = Get-Content $indexPath -Raw
          $entries = @($raw | ConvertFrom-Json)

          $entry = $entries | Where-Object { $_.InternalName -eq 'BetterTips' } | Select-Object -First 1
          if ($null -eq $entry) {
            Write-Host "No existing BetterTips entry; appending."
            $entry = [pscustomobject]@{
              Author              = "Sel"
              Name                = "BetterTips"
              AssemblyVersion     = $env:BETTERTIPS_VERSION
              # Testing-exclusive: Dalamud's CanUseTesting() requires TestingDalamudApiLevel, and the
              # install compat check needs DalamudApiLevel == the running API level. Without these the
              # plugin is filtered out / reported as a version mismatch for testers.
              DalamudApiLevel        = [int]$env:BETTERTIPS_API_LEVEL
              TestingAssemblyVersion = $env:BETTERTIPS_VERSION
              TestingDalamudApiLevel = [int]$env:BETTERTIPS_API_LEVEL
              Punchline           = "Trim the clutter from item tooltips."
              Description         = "Declutters and redesigns FFXIV item tooltips. Remove, reorder, and add sections (Gear Sets, Glamour, Condition, Ownership), or flip on the Enhanced curated layout for a fully redesigned tooltip."
              InternalName        = "BetterTips"
              RepoUrl             = "https://github.com/Hildaware/BetterTips"
              IsHide              = $false
              # Beta: testing-exclusive, so only users opted into Dalamud testing builds see/get it.
              IsTestingExclusive  = $true
              ApplicableVersion   = "any"
              DownloadLinkInstall = $download
              DownloadLinkTesting = $download
              DownloadLinkUpdate  = $download
              IconUrl             = "https://hildaware.github.io/Hilda/media/betterTips.png"
            }
            $entries += $entry
          } else {
            $entry.AssemblyVersion     = $env:BETTERTIPS_VERSION
            # Keep it a testing-exclusive (beta) plugin on every release.
            $entry.IsTestingExclusive  = $true
            # Testing-exclusive entries need these or Dalamud filters the plugin out of the testing
            # channel (CanUseTesting requires TestingDalamudApiLevel) and fails the API compat check.
            $entry | Add-Member -NotePropertyName DalamudApiLevel        -NotePropertyValue ([int]$env:BETTERTIPS_API_LEVEL) -Force
            $entry | Add-Member -NotePropertyName TestingAssemblyVersion -NotePropertyValue $env:BETTERTIPS_VERSION          -Force
            $entry | Add-Member -NotePropertyName TestingDalamudApiLevel -NotePropertyValue ([int]$env:BETTERTIPS_API_LEVEL) -Force
            $entry.DownloadLinkInstall = $download
            $entry.DownloadLinkTesting = $download
            $entry.DownloadLinkUpdate  = $download
          }

          $json = ConvertTo-Json -InputObject $entries -Depth 10
          Set-Content -Path $indexPath -Value $json -Encoding utf8 -NoNewline

          $changed = git status --porcelain $indexPath
          if (-not $changed) {
            Write-Host "index.json already at $env:BETTERTIPS_VERSION; skipping push"
            "XIV_COMMIT_URL=(no change)" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $indexPath
            git commit -m "Update BetterTips to $env:BETTERTIPS_VERSION"
            git push origin HEAD:main
            $sha = git rev-parse HEAD
            "XIV_COMMIT_URL=https://github.com/Hildaware/xiv/commit/$sha" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          Pop-Location

      - name: Write job summary
        shell: pwsh
        run: |
          if ($env:DRY_RUN -eq 'true') {
            $summary = @"
          ## Dry run: BetterTips $env:BETTERTIPS_VERSION

          Built and packaged ``$env:BETTERTIPS_VERSION.zip`` (uploaded as a workflow artifact on this run page). No cross-repo writes were performed.

          When you're ready for a real release, push ``release/<version>`` from main (or re-run this workflow with ``dry_run=false``).
          "@
          } else {
            $summary = @"
          ## BetterTips $env:BETTERTIPS_VERSION released (testing / beta)

          | Artifact | Location |
          |---|---|
          | Plugin release | $env:RELEASE_URL |
          | index.json commit | $env:XIV_COMMIT_URL |
          "@
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
